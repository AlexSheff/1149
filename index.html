// НОВЫЕ КОНСТАНТЫ (добавь сразу после определения LAYERS)
const GH_OWNER = 'AlexSheff';
const GH_REPO = '1149';
const GH_BRANCH = 'main';

// (весь оригинальный код до submitIdea остаётся без изменений)

// ════════════════════════════════════════════════════════════════
// ЗАМЕНИ полностью функцию submitIdea на эту:
async function submitIdea(e) {
  e.preventDefault();
  const ideas = getIdeas();
  const now = new Date().toISOString().split('T')[0];
  const F = s => document.getElementById(s).value.trim();

  const idea = {
    id: editingId || generateId(),
    title: F('f-title'), tagline: F('f-tagline'),
    layer: F('f-layer'), status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    doctype: F('f-doctype'),
    progress: parseInt(document.getElementById('f-progress').value)||0,
    tags: F('f-tags').split(',').map(t=>t.trim()).filter(Boolean),
    related: F('f-related').split(',').map(t=>t.trim()).filter(Boolean),
    whitepaper: document.getElementById('f-whitepaper').value.trim(),
    techspec: document.getElementById('f-techspec').value.trim(),
    solidarity: document.getElementById('f-solidarity').value.trim(),
    is1149: document.getElementById('f-1149').value === 'true',
    updated: now, files: pendingFiles
  };

  if (editingId) {
    const idx = ideas.findIndex(x => x.id === editingId);
    if (idx !== -1) ideas[idx] = idea;
  } else {
    ideas.push(idea);
  }

  await save(ideas);
  await syncSingleIdea(idea);           // ← главный вызов

  toast((editingId ? 'Idea updated' : 'Idea created in /ideas/') + ' ✓', 'success');
  nav('idea', idea.id);
}

// ════════════════════════════════════════════════════════════════
// НОВАЯ ФУНКЦИЯ — главная магия (добавь после submitIdea)
async function syncSingleIdea(idea) {
  const token = getToken();
  if (!token) {
    toast('No GitHub token — files saved only locally', 'error');
    return;
  }

  const slug = idea.id;
  const basePath = `ideas/${slug}/`;

  // 1. Получаем SHA
  const refRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/ref/heads/${GH_BRANCH}`, {
    headers: { Authorization: `token ${token}` }
  });
  const ref = await refRes.json();
  const baseSha = ref.object.sha;

  // 2. Базовое дерево
  const treeRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/trees/${baseSha}`, {
    headers: { Authorization: `token ${token}` }
  });
  const baseTree = await treeRes.json();

  const treeItems = [];

  // WHITE_PAPER.md
  const wpContent = `---
id: ${idea.id}
title: ${idea.title}
layer: ${idea.layer}
doctype: White Paper
status: ${idea.status}
priority: ${idea.priority}
tags: ${idea.tags.join(' ')}
related: ${idea.related.join(' ')}
is_1149: ${idea.is1149}
created: ${new Date().toISOString().split('T')[0]}
updated: ${idea.updated}
author: Founder Alex
---

${idea.whitepaper || '# White Paper\\n\\n(пока пусто)'}
`.trim();

  treeItems.push({ path: `${basePath}WHITE_PAPER.md`, mode: '100644', type: 'blob', content: wpContent });

  // RESEARCH.md (бывший techspec)
  const researchContent = `---
id: ${idea.id}
title: ${idea.title} — Research
---

${idea.techspec || '# Research\\n\\n(пока пусто)'}
`.trim();

  treeItems.push({ path: `${basePath}RESEARCH.md`, mode: '100644', type: 'blob', content: researchContent });

  // Attachments
  if (idea.files && idea.files.length) {
    for (const f of idea.files) {
      const base64 = f.data.split(',')[1];
      treeItems.push({
        path: `${basePath}attachments/${f.name}`,
        mode: '100644',
        type: 'blob',
        content: base64
      });
    }
  }

  // Создаём новое дерево → commit → push
  const newTreeRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/trees`, {
    method: 'POST',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ base_tree: baseTree.sha, tree: treeItems })
  });
  const newTree = await newTreeRes.json();

  const commitRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/commits`, {
    method: 'POST',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: `Added idea ${idea.id} via RRL OS`,
      tree: newTree.sha,
      parents: [baseSha]
    })
  });
  const newCommit = await commitRes.json();

  await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/git/refs/heads/${GH_BRANCH}`, {
    method: 'PATCH',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ sha: newCommit.sha })
  });

  toast(`Files pushed to /ideas/${idea.id}/ ✓`, 'success');
}
