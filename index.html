<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Reality Refactor Lab · Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2EFE8; 
            --surface: #FDFCF8; 
            --surface2: #F6F3EC;
            --sidebar: #18192C; 
            --sidebar2: #21233A;
            --ink: #16172A; 
            --gold: #A86532;
            --accent: #4F46E5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            overflow: hidden;
        }

        .serif { font-family: 'Fraunces', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Sidebar Styles */
        .sidebar { background: var(--sidebar); color: white; }
        .sidebar-item { 
            transition: all 0.2s; 
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover { background: var(--sidebar2); }
        .sidebar-item.active { 
            background: var(--sidebar2); 
            border-left-color: var(--gold);
        }

        /* Glass & Paper Effects */
        .paper { 
            background: var(--surface); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Markdown Rendering */
        .prose h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 700; color: var(--ink); margin-bottom: 1.5rem; }
        .prose h2 { font-family: 'Fraunces', serif; font-size: 1.75rem; margin-top: 2rem; color: var(--ink2); }
        .prose p { line-height: 1.7; margin-bottom: 1.25rem; font-size: 1.05rem; }
        .prose code { font-family: 'JetBrains Mono'; background: var(--surface2); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
        .prose pre { background: var(--sidebar); color: #E5E7EB; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; overflow-x: auto; }

        /* Inputs */
        .input-field {
            background: var(--surface2);
            border: 1px solid rgba(0,0,0,0.1);
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: var(--gold); outline: none; }

        #editor-ui { display: none; }
    </style>
</head>
<body class="h-screen flex">

    <!-- SIDEBAR -->
    <aside class="sidebar w-80 flex-shrink-0 flex flex-col shadow-2xl z-20">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-8 h-8 bg-gold flex items-center justify-center rounded-full" style="background: var(--gold)">
                    <span class="text-white font-bold">R</span>
                </div>
                <h1 class="serif text-xl font-bold tracking-tight">Reality Refactor</h1>
            </div>
            <p class="text-[10px] uppercase tracking-[0.2em] opacity-40 font-bold mb-8">Lab Control Center</p>
            
            <button onclick="createNewFile()" class="w-full py-3 px-4 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-[0.98]" style="background: var(--gold)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Создать проект
            </button>
        </div>

        <div class="px-4 mb-4">
            <div class="text-[10px] uppercase tracking-widest opacity-30 font-bold px-4 mb-3">Documents</div>
            <nav id="file-list" class="space-y-1 overflow-y-auto flex-1 max-h-[60vh]">
                <div class="px-4 py-8 text-center opacity-30 text-xs">Загрузка репозитория...</div>
            </nav>
        </div>

        <div class="mt-auto p-6 border-t border-white/5">
            <button onclick="toggleSettings()" class="flex items-center gap-3 text-xs opacity-50 hover:opacity-100 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Terminal Settings
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <!-- HEADER -->
        <header class="h-20 border-b border-black/5 flex items-center justify-between px-12 bg-transparent z-10">
            <div id="path-indicator" class="mono text-[10px] uppercase tracking-widest opacity-40 italic">System Idle</div>
            <div class="flex items-center gap-6">
                <button id="edit-action" onclick="toggleEditMode()" class="hidden serif italic text-sm border-b border-gold/40 hover:border-gold transition-all text-gold">Edit Content</button>
                <button id="delete-action" onclick="deleteActiveFile()" class="hidden text-[10px] uppercase tracking-widest text-red-400 hover:text-red-600 font-bold">Destroy</button>
            </div>
        </header>

        <!-- VIEW AREA -->
        <section id="view-ui" class="flex-1 overflow-y-auto p-12 lg:p-24 relative">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
                <div class="w-24 h-24 mb-6 opacity-10">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h2 class="serif text-3xl italic opacity-20">Waiting for data...</h2>
                <p class="mt-4 text-xs mono uppercase tracking-widest opacity-20">Select a refactor node from the left panel</p>
            </div>
            <div id="render-target" class="prose max-w-4xl mx-auto"></div>
        </section>

        <!-- EDITOR AREA -->
        <section id="editor-ui" class="flex-1 flex flex-col animate-in fade-in duration-500">
            <div class="flex-1 flex min-h-0">
                <textarea id="editor-input" class="w-1/2 h-full p-12 bg-transparent mono text-sm outline-none resize-none border-r border-black/5 leading-relaxed" placeholder="Write markdown here..."></textarea>
                <div id="editor-preview" class="w-1/2 h-full p-12 overflow-y-auto prose max-w-none bg-white/30"></div>
            </div>
            <div class="h-24 border-t border-black/5 flex items-center justify-between px-12 bg-surface2/50 backdrop-blur-md">
                <button onclick="cancelEditing()" class="text-xs mono uppercase tracking-widest opacity-40 hover:opacity-100">Discard</button>
                <button onclick="commitChanges()" id="save-button" class="px-8 py-3 rounded-full text-white font-bold text-sm shadow-lg transition-transform hover:scale-105 active:scale-95" style="background: var(--sidebar)">
                    Commit to GitHub
                </button>
            </div>
        </section>

    </main>

    <!-- SETTINGS MODAL -->
    <div id="modal-settings" class="fixed inset-0 bg-sidebar/80 backdrop-blur-sm hidden items-center justify-center z-[100] p-6">
        <div class="paper w-full max-w-lg rounded-3xl p-10 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-5 font-black text-6xl italic serif">Config</div>
            <h3 class="serif text-3xl font-bold mb-2">Protocol Settings</h3>
            <p class="text-xs mono opacity-40 mb-8 uppercase tracking-tighter">Encrypted Local Storage Only</p>
            
            <div class="space-y-6 relative z-10">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-2 opacity-50">GitHub Access Token</label>
                    <input type="password" id="cfg-token" class="w-full p-4 rounded-xl input-field text-sm" placeholder="ghp_********************">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-2 opacity-50">Repository Path</label>
                    <input type="text" id="cfg-repo" class="w-full p-4 rounded-xl input-field text-sm" placeholder="username/repository">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest mb-2 opacity-50">Branch</label>
                        <input type="text" id="cfg-branch" class="w-full p-4 rounded-xl input-field text-sm" value="main">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest mb-2 opacity-50">Root Folder</label>
                        <input type="text" id="cfg-path" class="w-full p-4 rounded-xl input-field text-sm" value="projects">
                    </div>
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="applySettings()" class="flex-1 py-4 bg-sidebar text-white rounded-2xl font-bold hover:bg-sidebar2 transition-colors">Apply Changes</button>
                <button onclick="toggleSettings()" class="flex-1 py-4 bg-black/5 rounded-2xl font-bold hover:bg-black/10 transition-colors">Close</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-[200]">
        <div class="bg-sidebar text-white px-8 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <div id="notif-icon" class="w-2 h-2 rounded-full bg-gold"></div>
            <span id="notif-text" class="mono text-[10px] uppercase tracking-widest">Action completed</span>
        </div>
    </div>

    <script>
        // --- GLOBAL STATE ---
        const state = {
            config: {
                token: localStorage.getItem('rt_token') || '',
                repo: localStorage.getItem('rt_repo') || '',
                branch: localStorage.getItem('rt_branch') || 'main',
                folder: localStorage.getItem('rt_path') || 'projects'
            },
            files: [],
            active: null, // { path, sha, content, name }
            mode: 'view'
        };

        // --- INIT ---
        window.addEventListener('DOMContentLoaded', () => {
            if (!state.config.token || !state.config.repo) {
                toggleSettings();
            } else {
                loadFileSystem();
            }

            // Real-time Preview
            const editor = document.getElementById('editor-input');
            const preview = document.getElementById('editor-preview');
            editor.addEventListener('input', () => {
                preview.innerHTML = marked.parse(editor.value);
            });
        });

        // --- UI UTILS ---
        function notify(msg, err = false) {
            const el = document.getElementById('notification');
            const text = document.getElementById('notif-text');
            const icon = document.getElementById('notif-icon');
            
            text.innerText = msg;
            icon.style.background = err ? '#f87171' : '#A86532';
            
            el.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => el.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function toggleSettings() {
            const m = document.getElementById('modal-settings');
            document.getElementById('cfg-token').value = state.config.token;
            document.getElementById('cfg-repo').value = state.config.repo;
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function applySettings() {
            state.config.token = document.getElementById('cfg-token').value.trim();
            state.config.repo = document.getElementById('cfg-repo').value.trim();
            state.config.branch = document.getElementById('cfg-branch').value.trim();
            state.config.folder = document.getElementById('cfg-path').value.trim().replace(/^\/+|\/+$/g, '');

            localStorage.setItem('rt_token', state.config.token);
            localStorage.setItem('rt_repo', state.config.repo);
            localStorage.setItem('rt_branch', state.config.branch);
            localStorage.setItem('rt_path', state.config.folder);

            toggleSettings();
            loadFileSystem();
            notify("Protocol Updated");
        }

        // --- GITHUB API CORE ---
        async function callAPI(endpoint, options = {}) {
            const headers = {
                'Authorization': `token ${state.config.token}`,
                'Accept': 'application/vnd.github.v3+json',
                ...options.headers
            };
            const response = await fetch(`https://api.github.com/repos/${state.config.repo}${endpoint}`, { ...options, headers });
            if (response.status === 401) { notify("Auth Failed", true); throw new Error("401"); }
            return response;
        }

        async function loadFileSystem() {
            const list = document.getElementById('file-list');
            try {
                const res = await callAPI(`/contents/${state.config.folder}?ref=${state.config.branch}`);
                if (!res.ok) throw new Error("Folder missing");
                
                const data = await res.json();
                state.files = data.filter(item => item.name.endsWith('.md'));
                
                list.innerHTML = state.files.map(f => `
                    <button onclick="fetchFile('${f.path}')" class="sidebar-item w-full text-left px-6 py-3 text-xs mono tracking-tighter opacity-60 hover:opacity-100 flex items-center gap-3">
                        <span class="text-[8px]">MD</span>
                        <span class="truncate">${f.name.replace('.md', '')}</span>
                    </button>
                `).join('');

                if(state.files.length === 0) list.innerHTML = '<div class="p-6 opacity-20 text-[10px] italic">No nodes found</div>';
            } catch (e) {
                list.innerHTML = `<div class="p-6 text-red-400 text-[10px]">Error connecting to uplink</div>`;
            }
        }

        async function fetchFile(path) {
            notify("Decrypting Node...");
            try {
                const res = await callAPI(`/contents/${path}?ref=${state.config.branch}`);
                const data = await res.json();
                
                const rawContent = decodeURIComponent(escape(atob(data.content)));
                state.active = {
                    path: data.path,
                    sha: data.sha,
                    content: rawContent,
                    name: data.name
                };

                renderActive();
            } catch (e) {
                notify("Link Error", true);
            }
        }

        function renderActive() {
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('render-target').innerHTML = marked.parse(state.active.content);
            document.getElementById('path-indicator').textContent = state.active.path;
            
            document.getElementById('edit-action').classList.remove('hidden');
            document.getElementById('delete-action').classList.remove('hidden');
            
            document.getElementById('view-ui').style.display = 'block';
            document.getElementById('editor-ui').style.display = 'none';
        }

        // --- EDITOR LOGIC ---
        function toggleEditMode() {
            state.mode = 'edit';
            document.getElementById('view-ui').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'flex';
            
            const input = document.getElementById('editor-input');
            input.value = state.active ? state.active.content : "# New Refactor\n\nEnter data stream...";
            document.getElementById('editor-preview').innerHTML = marked.parse(input.value);
        }

        function cancelEditing() {
            if (state.active) {
                renderActive();
            } else {
                document.getElementById('editor-ui').style.display = 'none';
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('path-indicator').textContent = "System Idle";
            }
        }

        function createNewFile() {
            state.active = null;
            document.getElementById('path-indicator').textContent = "Drafting New Node";
            toggleEditMode();
        }

        async function commitChanges() {
            const btn = document.getElementById('save-button');
            const content = document.getElementById('editor-input').value;
            
            // Logic for file naming
            let path = state.active ? state.active.path : null;
            if (!path) {
                const titleMatch = content.match(/^#\s+(.+)/m);
                const safeName = titleMatch ? titleMatch[1].trim().toLowerCase().replace(/[^a-z0-9а-я]+/g, '-') : `node-${Date.now()}`;
                path = `${state.config.folder}/${safeName}.md`;
            }

            btn.disabled = true;
            btn.innerText = "Transmitting...";

            try {
                const payload = {
                    message: `Refactor node: ${path}`,
                    content: btoa(unescape(encodeURIComponent(content))),
                    branch: state.config.branch
                };
                if (state.active) payload.sha = state.active.sha;

                const res = await callAPI(`/contents/${path}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    notify("Stream Committed");
                    await loadFileSystem();
                    await fetchFile(path);
                } else {
                    const error = await res.json();
                    throw new Error(error.message);
                }
            } catch (e) {
                notify("Commit Failed: " + e.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = "Commit to GitHub";
            }
        }

        async function deleteActiveFile() {
            if (!state.active || !confirm("Permanently destroy this data node?")) return;

            try {
                const res = await callAPI(`/contents/${state.active.path}`, {
                    method: 'DELETE',
                    body: JSON.stringify({
                        message: `Archive node: ${state.active.path}`,
                        sha: state.active.sha,
                        branch: state.config.branch
                    })
                });

                if (res.ok) {
                    notify("Node Destroyed");
                    state.active = null;
                    loadFileSystem();
                    cancelEditing();
                }
            } catch (e) {
                notify("Cleanup Error", true);
            }
        }
    </script>
</body>
</html>
