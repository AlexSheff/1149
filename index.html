<body>
<div id="app">
  <!-- SIDEBAR и все страницы — без изменений (только dashboard и layer-страницы обновлены) -->
  <!-- ... (твой оригинальный HTML до <script>) ... -->

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page active">
    <!-- ... твой pg-head ... -->
    <div id="dash-stats" class="stats-row s5" style="margin-bottom:18px"></div>
    <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start">
      <div>
        <div class="sh">Architecture Layers <button class="sh-act" onclick="nav('ideas')">View All →</button></div>
        <div id="dash-layers"></div>

        <div class="sh" style="margin-top:24px">All Repo MD Files <span id="dash-md-count" style="font-size:9px;color:var(--ink3)"></span></div>
        <div id="dash-md-files"></div>
      </div>
      <!-- остальное без изменений -->

  </div>

  <!-- LAYER PAGES (теперь показывают и сырые .md) -->
  <div id="page-layer-01" class="page"></div>

</div>

<script>
// === ВСЁ ТВОЁ (LAYERS, GITHUB API, SAVE, SEED и т.д.) ОСТАЁТСЯ БЕЗ ИЗМЕНЕНИЙ ===
// Только две функции обновлены + глобальная переменная

let allMdFiles = [];   // ← новая глобальная переменная

// ==================== УЛУЧШЕННЫЙ СКАН (уже был правильный, но теперь сохраняем в allMdFiles) ====================
async function scanAllMdFiles() {
  const files = [];
  // root
  try {
    const root = await ghListDir('');
    for (const f of root) {
      if (f.type === 'file' && /\.md$/i.test(f.name)) {
        files.push({path: f.name, name: f.name, layer: null, size: f.size, sha: f.sha});
      }
    }
  } catch {}
  // layers + direct .md + subfolders
  for (const lk of LAYER_KEYS) {
    try {
      const entries = await ghListDir(lk);
      for (const entry of entries) {
        if (entry.type === 'file' && /\.md$/i.test(entry.name)) {
          files.push({path: `${lk}/${entry.name}`, name: entry.name, layer: lk, size: entry.size, sha: entry.sha});
        } else if (entry.type === 'dir') {
          try {
            const sub = await ghListDir(`${lk}/${entry.name}`);
            for (const sf of sub) {
              if (sf.type === 'file' && /\.md$/i.test(sf.name)) {
                files.push({path: `${lk}/${entry.name}/${sf.name}`, name: sf.name, folder: entry.name, layer: lk, size: sf.size, sha: sf.sha});
              }
            }
          } catch {}
        }
      }
    } catch {}
  }
  allMdFiles = files;           // ← сохраняем глобально
  window._mdFilesCache = files;
  return files;
}

// ==================== DASHBOARD (принудительный свежий скан) ====================
async function renderDashboard() {
  // ... твой код статистики, recent ideas, mini-repos ...

  // === FORCE REFRESH MD FILES ===
  await loadDashMdFiles(true);   // true = принудительно сканировать заново

  // ... остальной код дашборда ...
}

// ==================== LAYER PAGE (НОВЫЙ БЛОК — Raw MD Documents) ====================
function renderLayer(num) {
  const lk = LAYER_KEYS.find(k => LAYERS[k].num === num);
  if (!lk) return;
  const L = LAYERS[lk];
  const ideas = getIdeas().filter(i => i.layer === lk);

  const layerMd = allMdFiles.filter(f => f.layer === lk);

  const el = document.getElementById(`page-layer-${num}`);
  el.innerHTML = `
    <div class="pg-head"> ... (твой заголовок слоя) ... </div>

    ${ideas.length ? `<div class="g3">${ideas.map(i => ideaCardHtml(i)).join('')}</div>` : '<div class="empty-state">...</div>'}

    <!-- НОВЫЙ БЛОК -->
    <div class="sh" style="margin-top:32px">Raw MD Documents in this layer <span style="font-size:9px;color:var(--ink3)">(${layerMd.length})</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">
      ${layerMd.map(f => `
        <div class="mini-row" onclick="rbOpenFile('${f.path}','${esc(f.name)}');nav('repo-browser')">
          <div style="width:28px;height:28px;background:${L.color}14;border:1px solid ${L.color}30;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px">📄</div>
          <div style="flex:1">
            <div style="font-weight:500">${esc(f.name)}</div>
            <div style="font-size:9px;color:var(--ink3);font-family:var(--mono)">${esc(f.path)}</div>
          </div>
          <div style="text-align:right;font-size:9px;color:var(--ink3)">${f.size ? fmtSize(f.size) : ''}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ==================== loadDashMdFiles (теперь использует allMdFiles) ====================
async function loadDashMdFiles(force = false) {
  const el = document.getElementById('dash-md-files');
  const cnt = document.getElementById('dash-md-count');
  if (!el) return;

  if (!force && window._mdFilesCache) {
    renderDashMdFiles(window._mdFilesCache, el, cnt);
    return;
  }

  el.innerHTML = `<div class="spinner"><span class="spin">↻</span> Scanning all .md files...</div>`;
  const files = await scanAllMdFiles();
  renderDashMdFiles(files, el, cnt);
}

function renderDashMdFiles(files, el, cnt) {
  if (cnt) cnt.textContent = `(${files.length})`;
  el.innerHTML = files.map(f => { /* твой оригинальный рендер mini-row */ }).join('');
}

// INIT — добавь в конец init()
await scanAllMdFiles();   // первый скан при загрузке

// === ВСЁ ОСТАЛЬНОЕ (твой оригинальный код) ===
</script>
</body>
