<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaFlow | Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --sidebar: #f4f4f5;
            --accent: #000000;
            --border: #e4e4e7;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #18181b;
            overflow: hidden;
        }
        .sidebar { background-color: var(--sidebar); border-right: 1px solid var(--border); }
        .card { background: white; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
        .card:hover { border-color: #a1a1aa; }
        .btn-primary { background: var(--accent); color: white; border-radius: 6px; padding: 8px 16px; font-weight: 500; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.8; }
        .btn-secondary { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; }
        .btn-secondary:hover { background: #f4f4f5; }
        
        /* Markdown Styling */
        .prose h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .prose h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose code { font-family: 'JetBrains Mono', monospace; background: #f4f4f5; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        .prose pre { background: #18181b; color: white; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
        
        #editor-container { display: none; }
        .loading-shimmer { background: linear-gradient(90deg, #f4f4f5 25%, #e4e4e7 50%, #f4f4f5 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="h-screen flex">

    <!-- Sidebar -->
    <aside class="sidebar w-64 flex-shrink-0 flex flex-col h-full">
        <div class="p-6 border-bottom border-zinc-200">
            <h1 class="text-xl font-bold tracking-tight">IdeaFlow</h1>
            <p class="text-xs text-zinc-500 mt-1">Research & Development</p>
        </div>
        
        <div class="px-4 mb-4">
            <button onclick="createNewItem()" class="w-full btn-primary text-sm flex items-center justify-center gap-2">
                <span>+</span> Новая идея
            </button>
        </div>

        <nav id="file-list" class="flex-1 overflow-y-auto px-2 space-y-1">
            <!-- Список файлов будет тут -->
            <div class="p-4 text-center text-zinc-400 text-sm">Загрузка...</div>
        </nav>

        <div class="p-4 border-t border-zinc-200">
            <button onclick="toggleSettings()" class="text-xs text-zinc-500 hover:text-black flex items-center gap-2">
                ⚙️ Настройки GitHub
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-white">
        <!-- Toolbar -->
        <header id="main-toolbar" class="h-16 border-b border-zinc-200 flex items-center justify-between px-8 bg-white z-10">
            <div id="active-file-path" class="text-sm font-medium text-zinc-500 italic">Выберите проект</div>
            <div class="flex items-center gap-3">
                <button id="edit-btn" onclick="startEditing()" class="hidden btn-secondary text-sm">Редактировать</button>
                <button id="delete-btn" onclick="deleteCurrentFile()" class="hidden text-red-500 text-sm hover:underline px-2">Удалить</button>
            </div>
        </header>

        <!-- View Mode -->
        <div id="view-container" class="flex-1 overflow-y-auto p-8 lg:p-16 max-w-4xl mx-auto w-full">
            <div id="welcome-screen" class="text-center mt-20">
                <div class="text-4xl mb-4">🚀</div>
                <h2 class="text-2xl font-semibold">Добро пожаловать</h2>
                <p class="text-zinc-500 mt-2">Выберите файл слева или создайте новый, чтобы начать работу.</p>
            </div>
            <article id="content-render" class="prose max-w-none"></article>
        </div>

        <!-- Editor Mode -->
        <div id="editor-container" class="flex-1 flex flex-col">
            <div class="flex-1 flex h-full">
                <textarea id="markdown-input" class="w-1/2 h-full p-8 outline-none border-r border-zinc-200 font-mono text-sm leading-relaxed" placeholder="Начните писать..."></textarea>
                <div id="preview-output" class="w-1/2 h-full p-8 overflow-y-auto prose max-w-none"></div>
            </div>
            <footer class="h-16 border-t border-zinc-200 flex items-center justify-end px-8 gap-4 bg-zinc-50">
                <button onclick="cancelEditing()" class="btn-secondary text-sm">Отмена</button>
                <button onclick="saveChanges()" id="save-btn" class="btn-primary text-sm">Сохранить в GitHub</button>
            </footer>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Настройки репозитория</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-zinc-500 mb-1">GitHub Personal Access Token</label>
                    <input type="password" id="gh-token" class="w-full p-3 border border-zinc-300 rounded-lg text-sm" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-zinc-500 mb-1">Репозиторий (user/repo)</label>
                    <input type="text" id="gh-repo" class="w-full p-3 border border-zinc-300 rounded-lg text-sm" placeholder="my-name/my-ideas">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-zinc-500 mb-1">Ветка</label>
                        <input type="text" id="gh-branch" class="w-full p-3 border border-zinc-300 rounded-lg text-sm" value="main">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-zinc-500 mb-1">Папка проектов</label>
                        <input type="text" id="gh-path" class="w-full p-3 border border-zinc-300 rounded-lg text-sm" value="projects">
                    </div>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="flex-1 btn-primary">Сохранить</button>
                <button onclick="toggleSettings()" class="flex-1 btn-secondary">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 translate-y-20 opacity-0 transition-all duration-300 bg-zinc-900 text-white px-6 py-3 rounded-lg shadow-xl text-sm z-[100]"></div>

    <script>
        // --- State Management ---
        let state = {
            config: {
                token: localStorage.getItem('gh_token') || '',
                repo: localStorage.getItem('gh_repo') || '',
                branch: localStorage.getItem('gh_branch') || 'main',
                folder: localStorage.getItem('gh_path') || 'projects'
            },
            files: [],
            currentFile: null, // { path, sha, content }
            isEditing: false
        };

        // --- Initialization ---
        window.onload = () => {
            if (!state.config.token || !state.config.repo) {
                toggleSettings();
            } else {
                refreshFileList();
            }
            
            // Sync editor preview
            const input = document.getElementById('markdown-input');
            const output = document.getElementById('preview-output');
            input.addEventListener('input', () => {
                output.innerHTML = marked.parse(input.value);
            });
        };

        // --- UI Logic ---
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#18181b';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            document.getElementById('gh-token').value = state.config.token;
            document.getElementById('gh-repo').value = state.config.repo;
            document.getElementById('gh-branch').value = state.config.branch;
            document.getElementById('gh-path').value = state.config.folder;
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function saveSettings() {
            const t = document.getElementById('gh-token').value.trim();
            const r = document.getElementById('gh-repo').value.trim();
            const b = document.getElementById('gh-branch').value.trim();
            const p = document.getElementById('gh-path').value.trim().replace(/^\/+|\/+$/g, '');

            localStorage.setItem('gh_token', t);
            localStorage.setItem('gh_repo', r);
            localStorage.setItem('gh_branch', b);
            localStorage.setItem('gh_path', p);

            state.config = { token: t, repo: r, branch: b, folder: p };
            toggleSettings();
            refreshFileList();
            showToast("Настройки сохранены");
        }

        // --- GitHub API Calls ---
        async function ghFetch(url, options = {}) {
            const headers = {
                'Authorization': `token ${state.config.token}`,
                'Accept': 'application/vnd.github.v3+json',
                ...options.headers
            };
            const response = await fetch(`https://api.github.com/repos/${state.config.repo}${url}`, { ...options, headers });
            
            if (response.status === 401) {
                showToast("Ошибка авторизации. Проверьте токен.", true);
                throw new Error("Unauthorized");
            }
            return response;
        }

        async function refreshFileList() {
            const listEl = document.getElementById('file-list');
            try {
                const res = await ghFetch(`/contents/${state.config.folder}?ref=${state.config.branch}`);
                if (!res.ok) throw new Error("Folder not found");
                
                const items = await res.json();
                state.files = items.filter(f => f.type === 'file' && f.name.endsWith('.md'));
                
                listEl.innerHTML = state.files.map(f => `
                    <button onclick="loadFile('${f.path}')" class="w-full text-left px-3 py-2 rounded-md text-sm hover:bg-zinc-200 transition-colors flex items-center gap-2 overflow-hidden">
                        <span class="opacity-40">📄</span>
                        <span class="truncate">${f.name.replace('.md', '')}</span>
                    </button>
                `).join('');
                
                if (state.files.length === 0) {
                    listEl.innerHTML = `<div class="p-4 text-xs text-zinc-400">В папке '${state.config.folder}' нет .md файлов</div>`;
                }
            } catch (e) {
                listEl.innerHTML = `<div class="p-4 text-xs text-red-400">Ошибка: ${e.message}</div>`;
            }
        }

        async function loadFile(path) {
            showToast("Загрузка...");
            try {
                const res = await ghFetch(`/contents/${path}?ref=${state.config.branch}`);
                const data = await res.json();
                
                const content = decodeURIComponent(escape(atob(data.content)));
                state.currentFile = {
                    path: data.path,
                    sha: data.sha,
                    content: content,
                    name: data.name
                };

                displayFile();
            } catch (e) {
                showToast("Не удалось загрузить файл", true);
            }
        }

        function displayFile() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('content-render').innerHTML = marked.parse(state.currentFile.content);
            document.getElementById('active-file-path').textContent = state.currentFile.path;
            document.getElementById('edit-btn').classList.remove('hidden');
            document.getElementById('delete-btn').classList.remove('hidden');
            
            // Switch modes
            document.getElementById('view-container').style.display = 'block';
            document.getElementById('editor-container').style.display = 'none';
            document.getElementById('main-toolbar').style.display = 'flex';
        }

        // --- Editing Logic ---
        function startEditing() {
            state.isEditing = true;
            document.getElementById('view-container').style.display = 'none';
            document.getElementById('editor-container').style.display = 'flex';
            document.getElementById('edit-btn').classList.add('hidden');
            
            const input = document.getElementById('markdown-input');
            input.value = state.currentFile ? state.currentFile.content : "# Название\n\nОписание идеи...";
            document.getElementById('preview-output').innerHTML = marked.parse(input.value);
        }

        function cancelEditing() {
            state.isEditing = false;
            if (state.currentFile) {
                displayFile();
            } else {
                document.getElementById('editor-container').style.display = 'none';
                document.getElementById('welcome-screen').style.display = 'block';
                document.getElementById('main-toolbar').style.display = 'flex';
                document.getElementById('active-file-path').textContent = "Выберите проект";
            }
        }

        function createNewItem() {
            state.currentFile = null;
            document.getElementById('active-file-path').textContent = "Новый черновик";
            startEditing();
        }

        async function saveChanges() {
            const btn = document.getElementById('save-btn');
            const newContent = document.getElementById('markdown-input').value;
            const titleMatch = newContent.match(/^#\s+(.+)/m);
            const fileName = titleMatch ? titleMatch[1].trim().toLowerCase().replace(/[^a-z0-9а-я]+/g, '-') + '.md' : `idea-${Date.now()}.md`;
            
            const path = state.currentFile ? state.currentFile.path : `${state.config.folder}/${fileName}`;
            
            btn.disabled = true;
            btn.textContent = "Сохранение...";

            try {
                const body = {
                    message: `Update ${path} via IdeaFlow`,
                    content: btoa(unescape(encodeURIComponent(newContent))),
                    branch: state.config.branch
                };
                if (state.currentFile) body.sha = state.currentFile.sha;

                const res = await ghFetch(`/contents/${path}`, {
                    method: 'PUT',
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    showToast("Успешно сохранено!");
                    await refreshFileList();
                    await loadFile(path);
                } else {
                    const err = await res.json();
                    throw new Error(err.message);
                }
            } catch (e) {
                showToast("Ошибка сохранения: " + e.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = "Сохранить в GitHub";
            }
        }

        async function deleteCurrentFile() {
            if (!state.currentFile || !confirm(`Удалить файл ${state.currentFile.name}?`)) return;

            try {
                const res = await ghFetch(`/contents/${state.currentFile.path}`, {
                    method: 'DELETE',
                    body: JSON.stringify({
                        message: `Delete ${state.currentFile.path}`,
                        sha: state.currentFile.sha,
                        branch: state.config.branch
                    })
                });

                if (res.ok) {
                    showToast("Файл удален");
                    state.currentFile = null;
                    refreshFileList();
                    cancelEditing();
                }
            } catch (e) {
                showToast("Ошибка удаления", true);
            }
        }
    </script>
</body>
</html>
